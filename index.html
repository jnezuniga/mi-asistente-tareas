<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- META TAGS PARA PWA -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mis Tareas">
    <meta name="description" content="Organiza tus tareas con categorías y prioridades">
    
    <!-- ICONOS -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📝</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23667eea'/><text x='50' y='75' font-size='60' text-anchor='middle' fill='white'>📝</text></svg>">
    
    <title>Mi Asistente de Tareas v2.0</title>
    
    <style>
        /* ===== VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-color: #667eea;
            --primary-dark: #5568d3;
            --secondary-color: #764ba2;
            --success-color: #4CAF50;
            --danger-color: #ff6b6b;
            --warning-color: #ffa726;
            --info-color: #42a5f5;
            
            /* Prioridades */
            --priority-high: #ff4757;
            --priority-medium: #ffa502;
            --priority-low: #2ed573;
            
            /* Categorías */
            --category-work: #667eea;
            --category-personal: #ff6b9d;
            --category-urgent: #ff4757;
            --category-other: #95a5a6;
            
            --text-dark: #333;
            --text-light: #666;
            --text-lighter: #999;
            --bg-light: #f8f9fa;
            --bg-completed: #e8f5e9;
            --border-color: #e0e0e0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* ===== ESTILOS GENERALES ===== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            padding: 12px;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        @media (max-width: 640px) {
            body {
                padding: 8px;
                padding-top: 12px;
                padding-bottom: 80px;
            }
            
            .container {
                padding: 20px 16px;
                border-radius: 20px;
            }
        }

        /* ===== ENCABEZADO ===== */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 1.8em;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.9em;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.5em;
            }
        }

        /* ===== FORMULARIO ===== */
        .add-task-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--bg-light);
            border-radius: 16px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        @media (max-width: 640px) {
            .input-row {
                flex-direction: column;
            }
        }

        #taskInput {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .select-group {
            display: flex;
            gap: 12px;
        }

        @media (max-width: 640px) {
            .select-group {
                flex-direction: column;
            }
        }

        select {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #addButton {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            touch-action: manipulation;
        }

        #addButton:active {
            transform: scale(0.98);
        }

        /* ===== ESTADÍSTICAS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-item {
            background: var(--bg-light);
            padding: 16px;
            border-radius: 14px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
        }

        .stat-label {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
            display: block;
        }

        /* ===== FILTROS ===== */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
        }

        /* ===== TAREAS ===== */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }

        h2 {
            color: var(--text-dark);
            font-size: 1.3em;
            font-weight: 600;
        }

        #clearCompleted {
            padding: 10px 16px;
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        #taskList {
            list-style: none;
        }

        .task-item {
            background: var(--bg-light);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            position: relative;
        }

        .task-item.priority-high {
            border-left-color: var(--priority-high);
        }

        .task-item.priority-medium {
            border-left-color: var(--priority-medium);
        }

        .task-item.priority-low {
            border-left-color: var(--priority-low);
        }

        .task-item.completed {
            opacity: 0.7;
            background: var(--bg-completed);
        }

        .task-checkbox {
            width: 28px;
            height: 28px;
            min-width: 28px;
            cursor: pointer;
            accent-color: var(--primary-color);
            margin-top: 2px;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 15px;
            color: var(--text-dark);
            line-height: 1.5;
            word-wrap: break-word;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .task-text:hover {
            color: var(--primary-color);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-lighter);
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .task-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .badge-category-work { background: var(--category-work); }
        .badge-category-personal { background: var(--category-personal); }
        .badge-category-urgent { background: var(--category-urgent); }
        .badge-category-other { background: var(--category-other); }

        .badge-priority {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-priority-high {
            background: rgba(255, 71, 87, 0.2);
            color: var(--priority-high);
        }

        .badge-priority-medium {
            background: rgba(255, 165, 2, 0.2);
            color: var(--priority-medium);
        }

        .badge-priority-low {
            background: rgba(46, 213, 115, 0.2);
            color: var(--priority-low);
        }

        .task-time {
            font-size: 11px;
            color: var(--text-lighter);
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            touch-action: manipulation;
        }

        .edit-btn {
            background: var(--info-color);
            color: white;
        }

        .edit-btn:active {
            transform: scale(0.95);
            background: #1e88e5;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
        }

        .delete-btn:active {
            transform: scale(0.95);
            background: #ff5252;
        }

        /* ===== MODAL DE EDICIÓN ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--text-dark);
            font-size: 1.4em;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input,
        .form-group select {
            padding: 12px 14px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-save {
            flex: 1;
            padding: 14px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: var(--text-lighter);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-lighter);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 16px;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-lighter);
            font-size: 0.85em;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 12px;
        }

        /* ===== ANIMACIONES ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ENCABEZADO -->
        <div class="header">
            <h1>📝 Mi Asistente de Tareas</h1>
            <p class="subtitle">Versión 2.0 - Editar • Categorías • Prioridades</p>
        </div>

        <!-- FORMULARIO -->
        <div class="add-task-form">
            <div class="input-row">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="¿Qué necesitas hacer?"
                    autocomplete="off"
                >
            </div>
            <div class="select-group">
                <select id="categorySelect">
                    <option value="work">🏢 Trabajo</option>
                    <option value="personal">👤 Personal</option>
                    <option value="urgent">⚡ Urgente</option>
                    <option value="other">📌 Otros</option>
                </select>
                <select id="prioritySelect">
                    <option value="low">🟢 Baja</option>
                    <option value="medium" selected>🟡 Media</option>
                    <option value="high">🔴 Alta</option>
                </select>
                <button id="addButton">Añadir</button>
            </div>
        </div>

        <!-- ESTADÍSTICAS -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">Completadas</span>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Todas</button>
            <button class="filter-btn" data-filter="work">🏢 Trabajo</button>
            <button class="filter-btn" data-filter="personal">👤 Personal</button>
            <button class="filter-btn" data-filter="urgent">⚡ Urgente</button>
            <button class="filter-btn" data-filter="other">📌 Otros</button>
        </div>

        <!-- LISTA DE TAREAS -->
        <div class="tasks-header">
            <h2>Mis Tareas</h2>
            <button id="clearCompleted">Limpiar</button>
        </div>
        
        <ul id="taskList"></ul>

        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">✨</div>
            <p>No tienes tareas pendientes</p>
            <p style="font-size: 0.9em; margin-top: 10px;">¡Añade tu primera tarea arriba!</p>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>💡 Click en una tarea para editarla</p>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✏️ Editar Tarea</h3>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label>Tarea</label>
                    <input type="text" id="editTaskInput">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="editCategorySelect">
                        <option value="work">🏢 Trabajo</option>
                        <option value="personal">👤 Personal</option>
                        <option value="urgent">⚡ Urgente</option>
                        <option value="other">📌 Otros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Prioridad</label>
                    <select id="editPrioritySelect">
                        <option value="low">🟢 Baja</option>
                        <option value="medium">🟡 Media</option>
                        <option value="high">🔴 Alta</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-save" id="saveEdit">Guardar</button>
                <button class="btn-cancel" id="cancelEdit">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let tasks = [];
        let currentFilter = 'all';
        let editingTaskId = null;

        // ===== ELEMENTOS DEL DOM =====
        const taskInput = document.getElementById('taskInput');
        const categorySelect = document.getElementById('categorySelect');
        const prioritySelect = document.getElementById('prioritySelect');
        const addButton = document.getElementById('addButton');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        const clearCompletedButton = document.getElementById('clearCompleted');
        
        const totalTasksElement = document.getElementById('totalTasks');
        const pendingTasksElement = document.getElementById('pendingTasks');
        const completedTasksElement = document.getElementById('completedTasks');

        const filterButtons = document.querySelectorAll('.filter-btn');
        
        // Modal
        const editModal = document.getElementById('editModal');
        const editTaskInput = document.getElementById('editTaskInput');
        const editCategorySelect = document.getElementById('editCategorySelect');
        const editPrioritySelect = document.getElementById('editPrioritySelect');
        const saveEditButton = document.getElementById('saveEdit');
        const cancelEditButton = document.getElementById('cancelEdit');

        // ===== CARGAR AL INICIAR =====
        window.addEventListener('load', () => {
            loadTasksFromStorage();
            renderTasks();
        });

        // ===== FUNCIÓN AÑADIR TAREA =====
        function addTask() {
            const taskText = taskInput.value.trim();
            
            if (taskText === '') {
                if (navigator.vibrate) navigator.vibrate(100);
                alert('Por favor escribe una tarea');
                return;
            }

            const task = {
                id: Date.now(),
                text: taskText,
                category: categorySelect.value,
                priority: prioritySelect.value,
                completed: false,
                createdAt: new Date().toLocaleString('es-ES')
            };

            tasks.unshift(task); // Añade al inicio
            taskInput.value = '';
            taskInput.focus();

            if (navigator.vibrate) navigator.vibrate(50);

            saveTasksToStorage();
            renderTasks();
        }

        // ===== FUNCIÓN TOGGLE TAREA =====
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                if (navigator.vibrate) navigator.vibrate(30);
                saveTasksToStorage();
                renderTasks();
            }
        }

        // ===== FUNCIÓN ELIMINAR TAREA =====
        function deleteTask(id) {
            if (confirm('¿Eliminar esta tarea?')) {
                tasks = tasks.filter(t => t.id !== id);
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                saveTasksToStorage();
                renderTasks();
            }
        }

        // ===== FUNCIÓN EDITAR TAREA =====
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            editingTaskId = id;
            editTaskInput.value = task.text;
            editCategorySelect.value = task.category;
            editPrioritySelect.value = task.priority;
            
            editModal.classList.add('active');
            editTaskInput.focus();
        }

        // ===== GUARDAR EDICIÓN =====
        function saveEdit() {
            const task = tasks.find(t => t.id === editingTaskId);
            if (!task) return;

            const newText = editTaskInput.value.trim();
            if (newText === '') {
                alert('La tarea no puede estar vacía');
                return;
            }

            task.text = newText;
            task.category = editCategorySelect.value;
            task.priority = editPrioritySelect.value;

            closeModal();
            saveTasksToStorage();
            renderTasks();

            if (navigator.vibrate) navigator.vibrate(50);
        }

        // ===== CANCELAR EDICIÓN =====
        function closeModal() {
            editModal.classList.remove('active');
            editingTaskId = null;
        }

        // ===== LIMPIAR COMPLETADAS =====
        function clearCompleted() {
            const completedCount = tasks.filter(t => t.completed).length;
            
            if (completedCount === 0) {
                alert('No hay tareas completadas');
                return;
            }

            if (confirm(`¿Eliminar ${completedCount} tarea(s)?`)) {
                tasks = tasks.filter(t => !t.completed);
                saveTasksToStorage();
                renderTasks();
            }
        }

        // ===== RENDERIZAR TAREAS =====
        function renderTasks() {
            taskList.innerHTML = '';

            const filteredTasks = currentFilter === 'all' 
                ? tasks 
                : tasks.filter(t => t.category === currentFilter);

            if (filteredTasks.length === 0) {
                emptyState.style.display = 'block';
                updateStats();
                return;
            } else {
                emptyState.style.display = 'none';
            }

            filteredTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item priority-${task.priority} ${task.completed ? 'completed' : ''}`;
                
                const categoryIcons = {
                    work: '🏢',
                    personal: '👤',
                    urgent: '⚡',
                    other: '📌'
                };

                const categoryNames = {
                    work: 'Trabajo',
                    personal: 'Personal',
                    urgent: 'Urgente',
                    other: 'Otros'
                };

                const priorityNames = {
                    high: 'Alta',
                    medium: 'Media',
                    low: 'Baja'
                };
                
                li.innerHTML = `
                    <input 
                        type="checkbox" 
                        class="task-checkbox" 
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    >
                    <div class="task-content">
                        <div class="task-text" onclick="editTask(${task.id})">
                            ${escapeHtml(task.text)}
                        </div>
                        <div class="task-meta">
                            <span class="task-badge badge-category-${task.category}">
                                ${categoryIcons[task.category]} ${categoryNames[task.category]}
                            </span>
                            <span class="badge-priority badge-priority-${task.priority}">
                                ${priorityNames[task.priority]}
                            </span>
                            <span class="task-time">${task.createdAt}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn edit-btn" onclick="editTask(${task.id})">
                            ✏️
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteTask(${task.id})">
                            🗑️
                        </button>
                    </div>
                `;

                taskList.appendChild(li);
            });

            updateStats();
        }

        // ===== ESCAPE HTML =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== ACTUALIZAR ESTADÍSTICAS =====
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            totalTasksElement.textContent = total;
            completedTasksElement.textContent = completed;
            pendingTasksElement.textContent = pending;
        }

        // ===== STORAGE =====
        function saveTasksToStorage() {
            try {
                localStorage.setItem('myTasks', JSON.stringify(tasks));
            } catch (e) {
                console.error('Error guardando:', e);
            }
        }

        function loadTasksFromStorage() {
            try {
                const savedTasks = localStorage.getItem('myTasks');
                if (savedTasks) {
                    tasks = JSON.parse(savedTasks);
                    
                    // Migrar tareas antiguas (sin categoría/prioridad)
                    tasks = tasks.map(task => ({
                        ...task,
                        category: task.category || 'other',
                        priority: task.priority || 'medium'
                    }));
                }
            } catch (e) {
                console.error('Error cargando:', e);
                tasks = [];
            }
        }

        // ===== EVENT LISTENERS =====
        addButton.addEventListener('click', addTask);

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        clearCompletedButton.addEventListener('click', clearCompleted);

        saveEditButton.addEventListener('click', saveEdit);
        cancelEditButton.addEventListener('click', closeModal);

        // Cerrar modal con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && editModal.classList.contains('active')) {
                closeModal();
            }
        });

        // Cerrar modal al hacer click fuera
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) closeModal();
        });

        // Filtros
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks();
            });
        });

        console.log('🎉 ¡Bienvenido a Mi Asistente de Tareas v2.0!');
        console.log('✨ Nuevas funciones: Editar • Categorías • Prioridades');
    </script>
</body>
</html>
